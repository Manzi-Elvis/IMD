name: CI

# Runs on every PR and on pushes to main — lint + unit tests for both apps,
# plus a real Postgres service container so backend tests that touch the
# state machine/guards run against the same engine as production, and a
# Docker build check so a broken Dockerfile fails CI instead of surfacing
# only at deploy time.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (lint, test, build)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: incident_app
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: incident_management_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U incident_app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  frontend:
    name: Frontend (lint, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check & build
        run: npm run build

  docker-build:
    name: Docker image build check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: false

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: production
          push: false

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-incident_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
      POSTGRES_DB: ${DB_NAME:-incident_management}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-incident_app}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-incident_app}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      DB_NAME: ${DB_NAME:-incident_management}
      DB_SYNCHRONIZE: 'false'
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      UPLOAD_DIR: /app/uploads
    ports:
      - '3000:3000'
    volumes:
      # Named volume, not a bind mount — evidence attachments persist across
      # container recreation without depending on the host's filesystem
      # layout.
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_URL: http://localhost:3000/api
        VITE_WS_URL: http://localhost:3000/incidents
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '5173:80'

volumes:
  postgres_data:
  backend_uploads:

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any path that isn't a real file goes to index.html so
    # React Router's client-side routes (e.g. /incidents/:id) work on a hard
    # refresh instead of 404ing at the nginx layer.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}
